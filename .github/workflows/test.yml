name: Test
on:
  push:
    branches-ignore:
      - 'main'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Vet
        run: go vet ./...
        working-directory: backend
      - name: Test
        run: go test ./...
        working-directory: backend

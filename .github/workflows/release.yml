name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LICENSE_WORKER_URL: ${{ secrets.LICENSE_WORKER_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis

      - name: Build Linux
        run: ./script/build-linux.sh

      - name: Build Windows
        run: ./script/build-installer.sh

      - name: Build macOS
        run: ./script/build-macos.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/tpdroid-linux.tar.gz
            dist/TPDroid-Setup.exe
            dist/tpdroid-macos-amd64.tar.gz
            dist/tpdroid-macos-arm64.tar.gz
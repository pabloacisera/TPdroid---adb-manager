<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activación TPDroid</title>
<link rel="icon" type="image/png" href="tpdroid-icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 40px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 24px;
    margin-bottom: 8px;
    text-align: center;
  }
  p.sub {
    color: #94a3b8;
    text-align: center;
    margin-bottom: 28px;
    font-size: 14px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #cbd5e1;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 16px;
    letter-spacing: 2px;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: #3b82f6;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2563eb; }
  button:disabled {
    background: #475569;
    cursor: not-allowed;
  }
  .message {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    text-align: center;
    display: none;
  }
  .message.success {
    display: block;
    background: #064e3b;
    color: #6ee7b7;
    border: 1px solid #065f46;
  }
  .message.error {
    display: block;
    background: #450a0a;
    color: #fca5a5;
    border: 1px solid #7f1d1d;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #94a3b8;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <img src="tpdroid-icon-without-background.png" alt="TPDroid" style="width:64px;height:64px;margin:0 auto 12px;display:block">
  <h1>Activación TPDroid</h1>
  <p class="sub">Ingrese el código de licencia recibido al comprar el producto</p>

  <form id="form">
    <div class="form-group">
      <label for="email">Email (para recuperación de licencia)</label>
      <input type="email" id="email" placeholder="usuario@ejemplo.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="codigo">Código de licencia</label>
      <input type="text" id="codigo" placeholder="TPD-XXXX-XXXX-XXXX" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" required>
    </div>
    <button type="submit" id="btn-activar">Activar</button>
  </form>

  <div id="message" class="message"></div>
  <div id="loading" class="hidden" style="text-align:center;margin-top:20px;color:#94a3b8;">
    <span class="spinner"></span> Activando licencia...
  </div>
  </div>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const codigo = document.getElementById('codigo').value.trim();
  if (!codigo) return;

  const btn = document.getElementById('btn-activar');
  const msg = document.getElementById('message');
  const loading = document.getElementById('loading');

  btn.disabled = true;
  msg.style.display = 'none';
  msg.className = 'message';
  loading.classList.remove('hidden');

  try {
    const email = document.getElementById('email').value.trim();
    const res = await fetch('/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigo, email }),
    });
    const data = await res.json();

    loading.classList.add('hidden');

    if (data.success) {
      msg.className = 'message success';
      msg.textContent = '✅ ' + data.message;
      msg.style.display = 'block';
      setTimeout(() => window.close(), 2000);
    } else {
      msg.className = 'message error';
      msg.textContent = '❌ ' + (data.error || 'Error de activación');
      msg.style.display = 'block';
      btn.disabled = false;
    }
  } catch (err) {
    loading.classList.add('hidden');
    msg.className = 'message error';
    msg.textContent = '❌ No se pudo conectar con el servidor de activación';
    msg.style.display = 'block';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
